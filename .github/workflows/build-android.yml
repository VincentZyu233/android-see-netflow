name: build-android

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  check-commit:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      should_release: ${{ steps.check.outputs.should_release }}
      version_name: ${{ steps.version.outputs.version_name }}
      commit_subject: ${{ steps.commit.outputs.commit_subject }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read commit subject
        id: commit
        shell: bash
        run: |
          set -euxo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            COMMIT_SUBJECT="${{ github.event.pull_request.title }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            COMMIT_SUBJECT="release event"
          else
            COMMIT_SUBJECT="${{ github.event.head_commit.message }}"
          fi
          COMMIT_SUBJECT="${COMMIT_SUBJECT%%$'\n'*}"
          echo "commit_subject=${COMMIT_SUBJECT}" >> "$GITHUB_OUTPUT"

      - name: Check trigger mode
        id: check
        shell: bash
        run: |
          set -euxo pipefail
          EVENT_NAME="${{ github.event_name }}"
          COMMIT_SUBJECT="${{ steps.commit.outputs.commit_subject }}"
          SHOULD_BUILD=false
          SHOULD_RELEASE=false

          if [ "$EVENT_NAME" = "release" ]; then
            SHOULD_BUILD=true
            SHOULD_RELEASE=true
          elif [ "$EVENT_NAME" = "pull_request" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SHOULD_BUILD=true
          elif echo "$COMMIT_SUBJECT" | grep -qiE "(build action|build release)"; then
            SHOULD_BUILD=true
            if echo "$COMMIT_SUBJECT" | grep -qi "build release"; then
              SHOULD_RELEASE=true
            fi
          fi

          echo "should_build=${SHOULD_BUILD}" >> "$GITHUB_OUTPUT"
          echo "should_release=${SHOULD_RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euxo pipefail
          BASE_VERSION=$(grep '^version = "' client/rust-core/Cargo.toml | head -1 | sed -E 's/^version = "([^"]+)"$/\1/')
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            VERSION_NAME="${BASE_VERSION}"
          fi
          echo "Resolved base version: ${BASE_VERSION}"
          echo "Resolved build version: ${VERSION_NAME}"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"

  build-artifact:
    needs: check-commit
    if: needs.check-commit.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    env:
      APP_VERSION_NAME: ${{ needs.check-commit.outputs.version_name }}
      APP_VERSION_CODE: ${{ github.run_number }}
      APP_SIGNING_STORE_FILE: ${{ runner.temp }}/android-debug.keystore
      APP_SIGNING_STORE_PASSWORD: android
      APP_SIGNING_KEY_ALIAS: androiddebugkey
      APP_SIGNING_KEY_PASSWORD: android
    defaults:
      run:
        working-directory: client/android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Install cargo-ndk
        shell: bash
        run: cargo install cargo-ndk --locked

      - name: Build Rust Android JNI libraries
        shell: bash
        working-directory: .
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
        run: |
          set -euxo pipefail
          python3 scripts/build_android_rust.py

      - name: Generate debug keystore for CI signing
        shell: bash
        run: |
          set -euxo pipefail
          keytool -genkeypair \
            -keystore "${APP_SIGNING_STORE_FILE}" \
            -storepass "${APP_SIGNING_STORE_PASSWORD}" \
            -alias "${APP_SIGNING_KEY_ALIAS}" \
            -keypass "${APP_SIGNING_KEY_PASSWORD}" \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Build release APKs
        shell: bash
        run: |
          set -euxo pipefail
          ./gradlew assembleRelease \
            -PAPP_VERSION_NAME="${APP_VERSION_NAME}" \
            -PAPP_VERSION_CODE="${APP_VERSION_CODE}" \
            -PAPP_SIGNING_STORE_FILE="${APP_SIGNING_STORE_FILE}" \
            -PAPP_SIGNING_STORE_PASSWORD="${APP_SIGNING_STORE_PASSWORD}" \
            -PAPP_SIGNING_KEY_ALIAS="${APP_SIGNING_KEY_ALIAS}" \
            -PAPP_SIGNING_KEY_PASSWORD="${APP_SIGNING_KEY_PASSWORD}"

      - name: Verify APK outputs
        shell: bash
        run: |
          set -euxo pipefail
          ls -lah app/build/outputs/apk/release/
          ls -lah app/build/generated/rustJniLibs/jniLibs/arm64-v8a/
          test -f "app/build/outputs/apk/release/app-armeabi-v7a-release.apk"
          test -f "app/build/outputs/apk/release/app-arm64-v8a-release.apk"
          test -f "app/build/outputs/apk/release/app-x86_64-release.apk"
          test -f "app/build/outputs/apk/release/app-universal-release.apk"
          test -f "app/build/generated/rustJniLibs/jniLibs/arm64-v8a/libandroid_see_netflow_core.so"
          test -f "app/build/generated/rustJniLibs/jniLibs/armeabi-v7a/libandroid_see_netflow_core.so"
          test -f "app/build/generated/rustJniLibs/jniLibs/x86_64/libandroid_see_netflow_core.so"

      - name: Collect artifacts
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ../../artifacts
          cp "app/build/outputs/apk/release/app-armeabi-v7a-release.apk" "../../artifacts/android-see-netflow-armeabi-v7a-v${APP_VERSION_NAME}.apk"
          cp "app/build/outputs/apk/release/app-arm64-v8a-release.apk" "../../artifacts/android-see-netflow-arm64-v8a-v${APP_VERSION_NAME}.apk"
          cp "app/build/outputs/apk/release/app-x86_64-release.apk" "../../artifacts/android-see-netflow-x86_64-v${APP_VERSION_NAME}.apk"
          cp "app/build/outputs/apk/release/app-universal-release.apk" "../../artifacts/android-see-netflow-universal-v${APP_VERSION_NAME}.apk"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-see-netflow-android-apks
          path: artifacts/*

  publish-release:
    needs:
      - check-commit
      - build-artifact
    if: needs.check-commit.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-see-netflow-android-apks
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euxo pipefail
          VERSION="${{ needs.check-commit.outputs.version_name }}"
          mkdir -p release-assets
          cp "artifacts/android-see-netflow-armeabi-v7a-v${VERSION}.apk" release-assets/
          cp "artifacts/android-see-netflow-arm64-v8a-v${VERSION}.apk" release-assets/
          cp "artifacts/android-see-netflow-x86_64-v${VERSION}.apk" release-assets/
          cp "artifacts/android-see-netflow-universal-v${VERSION}.apk" release-assets/

      - name: Render release template
        shell: bash
        run: |
          set -euxo pipefail
          VERSION="${{ needs.check-commit.outputs.version_name }}"
          REPO="${GITHUB_REPOSITORY}"
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"
          COMMIT="${{ github.sha }}"
          sed \
            -e "s|__VERSION__|${VERSION}|g" \
            -e "s|__BASE_URL__|${BASE_URL}|g" \
            -e "s|__COMMIT__|${COMMIT}|g" \
            .github/release_template.md > release-notes.md

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-commit.outputs.version_name }}
          body_path: release-notes.md
          files: |
            release-assets/android-see-netflow-armeabi-v7a-v*.apk
            release-assets/android-see-netflow-arm64-v8a-v*.apk
            release-assets/android-see-netflow-x86_64-v*.apk
            release-assets/android-see-netflow-universal-v*.apk
